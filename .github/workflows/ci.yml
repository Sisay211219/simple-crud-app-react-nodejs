name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      # ----------------------------
      # Frontend
      # ----------------------------

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      # For older React projects (react-scripts 3.x)
      - name: Build Frontend
        working-directory: ./frontend
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build

      # ----------------------------
      # Backend
      # ----------------------------

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      # Replace with "npm run build" if your backend has a build script
      - name: Verify Backend
        working-directory: ./backend
        run: echo "Backend build successful"

      # ----------------------------
      # Login to Docker Hub
      # ----------------------------

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # ----------------------------
      # Build Docker Images
      # ----------------------------

      - name: Build Backend Docker Image
        run: |
          docker build \
            -t ${{ vars.DOCKERHUB_USERNAME }}/simple-crud-backend:latest \
            ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build \
            -t ${{ vars.DOCKERHUB_USERNAME }}/simple-crud-frontend:latest \
            ./frontend

      # ----------------------------
      # Push Docker Images
      # ----------------------------

      - name: Push Backend Docker Image
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/simple-crud-backend:latest

      - name: Push Frontend Docker Image
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/simple-crud-frontend:latest
